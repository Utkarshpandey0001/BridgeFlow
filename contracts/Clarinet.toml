[project]
name = "bitflow"
description = "Bitflow — Bitcoin-native yield optimization vault with CCTP bridge"
authors = []
telemetry = false
cache_dir = '.cache'

[contracts.sip010-trait]
path = "contracts/sip010-trait.clar"
clarity_version = 2
epoch = 2.5

[contracts.usdc-token]
path = "contracts/usdc-token.clar"
clarity_version = 2
epoch = 2.5

[contracts.vault]
path = "contracts/vault.clar"
clarity_version = 2
epoch = 2.5

[repl.settings]
analysis = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
